version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Colombo
    open-pull-requests-limit: 5
    groups:
      react:
        patterns:
          - react
          - react-dom
          - "@types/react"
          - "@types/react-dom"
      tooling:
        patterns:
          - "@eslint/*"
          - "@vitejs/*"
          - eslint
          - eslint-*
          - typescript
          - typescript-eslint
          - vite

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Asia/Colombo
    open-pull-requests-limit: 3
